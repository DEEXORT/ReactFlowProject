spring.cassandra.connection.connect-timeout=30s
spring.cassandra.request.timeout=30s
spring.datasource.url=jdbc:cassandra://localhost:${spring.cassandra.port}/${spring.cassandra.keyspace-name}?localdatacenter=${spring.cassandra.local-datacenter}

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.url=jdbc:cassandra://localhost:${spring.cassandra.port}/${spring.cassandra.keyspace-name}?compliancemode=Liquibase&localdatacenter=${spring.cassandra.local-datacenter}
spring.liquibase.default-schema=test_keyspace
spring.liquibase.liquibase-schema=test_keyspace
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml
spring.liquibase.driver-class-name=com.ing.data.cassandra.jdbc.CassandraDriver

# Logging
logging.level.com.datastax.oss.driver=INFO
logging.level.org.springframework.data.cassandra=DEBUG
logging.level.org.testcontainers=INFO
logging.level.com.javarush.discussion=DEBUG